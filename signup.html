<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <main>
        <aside>
            <span><img src="logo.jpg" alt="logo"></span><span>EduLearn</span>
            <h1>Welcome to the Future of learning</h1>
            <h3>Your journey to knowledge starts here. Access thousands of courses anytime, anywhere.</h3>
            <img src="zura.jpg" alt="Zurag">
        </aside>
        <article>
            <h2>Welcome to EduLearn</h2>
            <h4>Create your account</h4>
            <form>
                <label for="name">Full Name:</label>
                <input type="text" name="name" placeholder="Enter your full name">
                <label for="email">Email:</label>
                <input type="text" name="email" placeholder="student@school.edu" required>
                <label for="password">Password:</label>
                <input type="password" name="password" placeholder="Password" required>
                <section class="form-rem">
                    <div>
                        <input type="checkbox" name="remember" id="remember">
                        <label for="remember">Remember Me</label>
                    </div>
                </section>
            </form>
            <button>Sign Up</button>
            <button>or continue with</button>
            <div class="social">
                <button><i class="fa-brands fa-google"></i> Google</button>
                <button><i class="fa-brands fa-microsoft"></i> Microsoft</button>
            </div>
            <span>Already have an account? <a href="index.html">Sign In</a></span>
        </article>
    </main>
</body>
</html>
